# ✅ MODERNIZED: Mule 4.9 Configuration Properties
# Enhanced configuration with externalized properties

# HTTP Configuration
http.host=0.0.0.0
http.port=8081

# Database Configuration (PostgreSQL)
db.url=jdbc:postgresql://localhost:5432/customerdb
db.user=muleuser
db.password=mulepass
db.driver=org.postgresql.Driver

# Salesforce Configuration
salesforce.username=demo@company.com
salesforce.password=demopassword
salesforce.securityToken=demosecuritytoken

# Application Configuration
app.name=Customer Service API 4.9
app.version=1.0.0
app.environment=development

# Logging Configuration
logging.level=INFO
logging.pattern=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Performance Configuration
connection.pool.size=10
connection.timeout=30000
batch.size=100
batch.threads=4

# Security Configuration
encryption.algorithm=AES
encryption.mode=CBC

# Monitoring Configuration
metrics.enabled=true
health.check.enabled=true